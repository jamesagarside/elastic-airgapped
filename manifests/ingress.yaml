# Ingress resources for local .local hostname access via ingress-nginx.
# Docker Desktop exposes the nginx LoadBalancer on 127.0.0.1, so after
# running  make add-hosts  each hostname resolves to the ingress controller.
#
# ECK enables HTTPS on all services by default, so we use:
#   backend-protocol: HTTPS  — nginx forwards to the HTTPS backend
#   ssl-verify: false         — skips verification of ECK's self-signed CA
#
# To trust ECK's CA properly, extract it with:
#   kubectl get secret ${CLUSTER_NAME}-es-http-certs-public \
#     -n ${ELASTIC_NS} -o go-template='{{index .data "tls.crt" | base64decode}}'
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana
  namespace: ${ELASTIC_NS}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  ingressClassName: nginx
  rules:
    - host: ${KIBANA_HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana-kb-http
                port:
                  number: 5601
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elasticsearch
  namespace: ${ELASTIC_NS}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
    # Increase timeouts for long-running ES queries
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: ${ES_HOSTNAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${CLUSTER_NAME}-es-http
                port:
                  number: 9200
